[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    auth: Tests de autenticacion
    products: Tests de productos
    sales: Tests de ventas
    cash: Tests de caja
    customers: Tests de clientes
    suppliers: Tests de proveedores
    purchases: Tests de compras
    reports: Tests de reportes
    accessibility: Tests de accesibilidad
    teardown: Tests de limpieza
